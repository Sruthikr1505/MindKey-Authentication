services:
  # Backend API
  - type: web
    name: mindkey-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd src/api && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DATABASE_URL
        value: sqlite:///./auth.db
    
  # Frontend
  - type: web
    name: mindkey-frontend
    env: static
    buildCommand: "cd frontend/eeg-auth-app && npm install && npm run build"
    staticPublishPath: frontend/eeg-auth-app/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
